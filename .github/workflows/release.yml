name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package release
        run: ./scripts/package_release.sh "${{ steps.version.outputs.version }}" build/release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grabber-${{ steps.version.outputs.version }}
          path: |
            build/release/grabber-${{ steps.version.outputs.version }}.zip
            build/release/grabber-${{ steps.version.outputs.version }}.zip.sha256

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/release/grabber-${{ steps.version.outputs.version }}.zip
            build/release/grabber-${{ steps.version.outputs.version }}.zip.sha256
          generate_release_notes: true
